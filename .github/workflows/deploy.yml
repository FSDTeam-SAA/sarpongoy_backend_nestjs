name: 🚀 Production Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:

      # ─────────────────────────────────────────
      # 1. Code নামাও
      # ─────────────────────────────────────────
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      # ─────────────────────────────────────────
      # 2. Node.js setup
      # ─────────────────────────────────────────
      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # ─────────────────────────────────────────
      # 3. Install + Build (check করার জন্য)
      # ─────────────────────────────────────────
      - name: 📦 Install & Build
        run: |
          npm ci
          npm run build

      # ─────────────────────────────────────────
      # 4. Docker Hub এ login করো
      # ─────────────────────────────────────────
      - name: 🐳 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ─────────────────────────────────────────
      # 5. Docker image build করো + Hub এ push করো
      # ─────────────────────────────────────────
      - name: 🔨 Build & Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/sarpongoy-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/sarpongoy-backend:${{ github.sha }}

      # ─────────────────────────────────────────
      # 6. VPS তে SSH করে deploy করো
      # ─────────────────────────────────────────
      - name: 🖥️ Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |

            echo "=============================="
            echo "🚀 Deploy শুরু হচ্ছে..."
            echo "=============================="

            # App folder তৈরি করো
            mkdir -p /app/nginx/ssl

            # ─────────────────────────
            # .env ফাইল তৈরি করো
            # ─────────────────────────
            cat > /app/.env << 'ENVEOF'
            NODE_ENV=production
            PORT=5000
            MONGO_URI=${{ secrets.MONGO_URI }}
            BCRYPT_SALT_ROUNDS=${{ secrets.BCRYPT_SALT_ROUNDS }}
            ACCESS_TOKEN_SECRET=${{ secrets.ACCESS_TOKEN_SECRET }}
            ACCESS_TOKEN_EXPIRES=${{ secrets.ACCESS_TOKEN_EXPIRES }}
            REFRESH_TOKEN_SECRET=${{ secrets.REFRESH_TOKEN_SECRET }}
            REFRESH_TOKEN_EXPIRES=${{ secrets.REFRESH_TOKEN_EXPIRES }}
            CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
            CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
            CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
            EMAIL_EXPIRES=${{ secrets.EMAIL_EXPIRES }}
            EMAIL_HOST=${{ secrets.EMAIL_HOST }}
            EMAIL_PORT=${{ secrets.EMAIL_PORT }}
            EMAIL_ADDRESS=${{ secrets.EMAIL_ADDRESS }}
            EMAIL_PASS=${{ secrets.EMAIL_PASS }}
            EMAIL_FROM=${{ secrets.EMAIL_FROM }}
            EMAIL_TO=${{ secrets.EMAIL_TO }}
            ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
            STRIPE_PUBLISHABLE_KEY=${{ secrets.STRIPE_PUBLISHABLE_KEY }}
            STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
            STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
            STRIPE_PLATFORM_ACCOUNT_ID=${{ secrets.STRIPE_PLATFORM_ACCOUNT_ID }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            FRONTEND_URL=${{ secrets.FRONTEND_URL }}
            BACKEND_URL=${{ secrets.BACKEND_URL }}
            DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            ENVEOF

            # ─────────────────────────
            # Nginx config তৈরি করো
            # ─────────────────────────
            cat > /app/nginx/default.conf << 'NGINXEOF'
            limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

            server {
                listen 80;
                server_name _;

                add_header X-Frame-Options "SAMEORIGIN" always;
                add_header X-Content-Type-Options "nosniff" always;
                add_header X-XSS-Protection "1; mode=block" always;

                client_max_body_size 100M;

                location / {
                    limit_req zone=api burst=20 nodelay;
                    proxy_pass http://app:5000;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection 'upgrade';
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    proxy_cache_bypass $http_upgrade;
                    proxy_connect_timeout 60s;
                    proxy_send_timeout 60s;
                    proxy_read_timeout 60s;
                }

                location /nginx-health {
                    access_log off;
                    return 200 "healthy\n";
                    add_header Content-Type text/plain;
                }
            }
            NGINXEOF

            # ─────────────────────────
            # docker-compose.yml তৈরি করো
            # ─────────────────────────
            cat > /app/docker-compose.yml << 'COMPOSEEOF'
            version: '3.9'
            services:
              nginx:
                image: nginx:alpine
                container_name: sarpongoy_nginx
                restart: unless-stopped
                ports:
                  - "80:80"
                  - "443:443"
                volumes:
                  - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
                  - ./nginx/ssl:/etc/nginx/ssl:ro
                  - nginx_logs:/var/log/nginx
                depends_on:
                  - app
                networks:
                  - backend_network

              app:
                image: ${{ secrets.DOCKER_USERNAME }}/sarpongoy-backend:latest
                container_name: sarpongoy_app
                restart: unless-stopped
                expose:
                  - "5000"
                env_file:
                  - .env
                networks:
                  - backend_network
                healthcheck:
                  test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000"]
                  interval: 30s
                  timeout: 10s
                  retries: 3
                  start_period: 40s

            networks:
              backend_network:
                driver: bridge

            volumes:
              nginx_logs:
            COMPOSEEOF

            # ─────────────────────────
            # নতুন image pull করো
            # ─────────────────────────
            echo "📥 Latest image pull করছি..."
            docker pull ${{ secrets.DOCKER_USERNAME }}/sarpongoy-backend:latest

            # ─────────────────────────
            # পুরনো containers বন্ধ করো
            # ─────────────────────────
            echo "⏹️ পুরনো containers বন্ধ করছি..."
            cd /app && docker compose down

            # ─────────────────────────
            # নতুন containers চালু করো
            # ─────────────────────────
            echo "▶️ নতুন containers চালু করছি..."
            cd /app && docker compose up -d

            # ─────────────────────────
            # পুরনো image মুছো
            # ─────────────────────────
            echo "🧹 পুরনো images মুছছি..."
            docker image prune -f

            echo "=============================="
            echo "✅ Deploy সফল হয়েছে!"
            echo "=============================="
services:
  app-dev:
    image: saurav11sarkardev/sarpongoy:dev
    env_file:
      - .env
    container_name: sarpongoy-dev
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    ports:
      - '5000:5000'
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    command: npm run start:dev
    profiles: ['dev']

  app-prod:
    image: saurav11sarkardev/sarpongoy:prod
    env_file:
      - .env
    container_name: sarpongoy-prod
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - '5000:5000'
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    profiles: ['prod']
services:
  # ================================================
  # Nginx — Reverse Proxy
  # ================================================
  nginx:
    image: nginx:alpine
    container_name: sarpongoy_nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - app
    networks:
      - backend_network

  # ================================================
  # NestJS Application
  # ================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: saurav11sarkardev/sarpongoy-backend:latest
    container_name: sarpongoy_app
    restart: unless-stopped
    expose:
      - '5000'
    env_file:
      - .env
    networks:
      - backend_network
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--quiet',
          '--tries=1',
          '--spider',
          'http://localhost:5000',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# ================================================
# Network
# ================================================
networks:
  backend_network:
    driver: bridge

# ================================================
# Volumes
# ================================================
volumes:
  nginx_logs:

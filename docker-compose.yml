services:
  app:
    image: ${DOCKER_USERNAME}/sarpongoy:latest
    container_name: sarpongoy_app
    restart: unless-stopped
    ports:
      - '5000:5000'
    env_file:
      - .env
    networks:
      - backend_network
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--quiet',
          '--tries=1',
          '--spider',
          'http://localhost:5000',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  backend_network:
    driver: bridge

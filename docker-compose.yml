version: '3.9'

services:

  # ================================================
  # Nginx — Reverse Proxy
  # Internet → Nginx (80) → NestJS App (5000)
  # ================================================
  nginx:
    image: nginx:alpine
    container_name: sarpongoy_nginx
    restart: unless-stopped
    ports:
      - "80:80"       # HTTP
      - "443:443"     # HTTPS (SSL লাগালে লাগবে)
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro          # SSL certificates
      - nginx_logs:/var/log/nginx
    depends_on:
      - app
    networks:
      - backend_network

  # ================================================
  # NestJS Application
  # ================================================
  app:
    image: ${DOCKER_USERNAME}/sarpongoy-backend:latest
    container_name: sarpongoy_app
    restart: unless-stopped
    # Port 5000 বাইরে expose করা হচ্ছে না
    # শুধু Nginx internal network এ access করবে
    expose:
      - "5000"
    env_file:
      - .env
    networks:
      - backend_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# ================================================
# Internal Network
# ================================================
networks:
  backend_network:
    driver: bridge

# ================================================
# Volumes
# ================================================
volumes:
  nginx_logs: